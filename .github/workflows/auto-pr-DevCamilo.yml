name: Auto PR DevJuliana -> desarrollo

on:
  push:
    branches:
      - DevJuliana

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Crear PR si no existe (DevJuliana -> desarrollo)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // ¿Ya hay PR abierto?
            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: 'open', base: 'desarrollo', head: `${owner}:DevJuliana`
            });
            if (prs.length > 0) {
              core.info('Ya existe un PR abierto de DevJuliana -> desarrollo.');
              return;
            }

            // Crear PR
            const { data: pr } = await github.rest.pulls.create({
              owner, repo,
              title: 'Auto PR: DevJuliana -> desarrollo',
              head: 'DevJuliana',
              base: 'desarrollo',
              body: 'PR creado automáticamente al hacer push en **DevJuliana**.'
            });
            core.info(`PR creado: #${pr.number}`);
