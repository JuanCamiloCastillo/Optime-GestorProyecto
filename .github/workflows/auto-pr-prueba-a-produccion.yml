name: Auto PR prueba -> produccion

on:
  push:
    branches:
      - prueba

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Crear PR si no existe (prueba -> produccion)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'produccion',
              head: `${context.repo.owner}:prueba`
            });
            if (prs.length > 0) {
              core.info('Ya existe un PR abierto de prueba -> produccion. No hago nada.');
              return;
            }
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Auto PR: prueba -> produccion',
              head: 'prueba',
              base: 'produccion',
              body: 'PR creado automáticamente al hacer push en la rama **prueba**.'
            });
            core.info(`PR creado: #${pr.number}`);
